<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#0d1b2e" rx="12"/>

  <!-- Handwheel spokes -->
  <line x1="50" y1="10" x2="50" y2="22" stroke="#1a7fbf" stroke-width="4" stroke-linecap="round"/>
  <line x1="36" y1="14" x2="42" y2="24" stroke="#1a7fbf" stroke-width="4" stroke-linecap="round"/>
  <line x1="64" y1="14" x2="58" y2="24" stroke="#1a7fbf" stroke-width="4" stroke-linecap="round"/>

  <!-- Handwheel ring -->
  <circle cx="50" cy="18" r="12" fill="none" stroke="#1a7fbf" stroke-width="5"/>
  <!-- Handwheel center hub -->
  <circle cx="50" cy="18" r="3" fill="#1a7fbf"/>

  <!-- Valve stem -->
  <rect x="44" y="28" width="12" height="12" fill="#1a7fbf" rx="2"/>

  <!-- Valve body -->
  <rect x="34" y="40" width="32" height="22" fill="#1a7fbf" rx="4"/>

  <!-- Left pipe flange -->
  <rect x="8" y="46" width="26" height="10" fill="#1a7fbf" rx="2"/>
  <rect x="8" y="44" width="5" height="14" fill="#1a7fbf" rx="1"/>

  <!-- Right pipe flange -->
  <rect x="66" y="46" width="26" height="10" fill="#1a7fbf" rx="2"/>
  <rect x="87" y="44" width="5" height="14" fill="#1a7fbf" rx="1"/>

  <!-- Valve bottom cap -->
  <ellipse cx="50" cy="62" rx="16" ry="9" fill="#1565a0"/>
  <ellipse cx="50" cy="62" rx="11" ry="6" fill="#1a7fbf"/>
</svg>
